name: Android CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Debug TicketApp files
        working-directory: TicketApp
        run: |
          pwd
          ls -la

      - name: Make gradlew executable
        working-directory: TicketApp
        run: chmod +x gradlew

      - name: Build (Debug) + Unit Tests
        working-directory: TicketApp
        run: ./gradlew --no-daemon clean testDebugUnitTest assembleDebug
